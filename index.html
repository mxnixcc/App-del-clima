<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba clima</title>

  <!-- 🎨 NUEVO: estilos -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">
    
    <h1>🌦️ Consulta el clima</h1>

    <!-- 🔎 Buscador -->
    <div class="search-box">
      <input 
        type="text" 
        id="citiesInput" 
        placeholder="Ej: Madrid, Paris, Tokyo"
      />

      <button id="getWeatherBtn">Obtener clima</button>
    </div>

    <!-- 📊 Resultados -->
    <div id="results"></div>

  </div>

  <!-- ⚙️ Script (NO tocar, necesario para backend JS) -->
  <script type="module" src="weather.js"></script>

</body>
</html>
